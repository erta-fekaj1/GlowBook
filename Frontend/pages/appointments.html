<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Book - Takimet</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="mobile-nav">
    <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    <span class="mobile-nav-logo">💅 Glow Book</span>
    <div style="width:40px;"></div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout-wrap">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1>Takimet</h1>
                <p id="apptSubtitle">Takimet tuaja</p>
            </div>
            <button class="btn-primary" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> Shto Takim
            </button>
        </div>

        <div class="filters">
            <input type="text" id="filterUser" placeholder="🔍 Kërko klient..." oninput="renderTable()">
            <select id="filterStatus" onchange="renderTable()">
                <option value="">Të gjitha statuset</option>
                <option value="Pending">Pending</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Done">Done</option>
                <option value="Cancelled">Cancelled</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Klienti</th>
                        <th>Shërbimi</th>
                        <th>Data &amp; Ora</th>
                        <th>Statusi</th>
                        <th>Veprimet</th>
                    </tr>
                </thead>
                <tbody id="apptTable">
                    <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem;">Duke ngarkuar...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 class="modal-title" id="modalTitle">Shto Takim</h2>
        <div class="field" id="clientField" data-admin><label>Klienti</label><select id="apptUser"></select></div>
        <div class="field"><label>Shërbimi</label><select id="apptService"></select></div>
        <div class="field"><label>Data dhe Ora</label><input type="datetime-local" id="apptDate"></div>
        <div class="field">
            <label>Statusi</label>
            <select id="apptStatus">
                <option value="Pending">Pending</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Done">Done</option>
                <option value="Cancelled">Cancelled</option>
            </select>
        </div>
        <div class="field"><label>Shënime</label><input type="text" id="apptNotes" placeholder="Shënime shtesë..."></div>
        <div class="modal-footer">
            <button class="btn-secondary" style="flex:1;" onclick="closeModal()">Anulo</button>
            <button class="btn-primary" style="flex:2;" onclick="saveAppt()">
                <i class="fa-solid fa-floppy-disk"></i> Ruaj
            </button>
        </div>
    </div>
</div>

<div class="gb-toast" id="toast"></div>

<script src="../js/role.js"></script>
<script>
gbInitPage({ page: 'appointments' });

const API = 'https://glowbook-1.onrender.com/api';
let appts = [], users = [], services = [], editingId = null;

/* Show subtitle based on role */
document.getElementById('apptSubtitle').textContent =
    gbIsAdmin() ? 'Menaxho të gjitha takimet' : 'Takimet tuaja të rezervuara';

/* Hide client filter for non-admins (they only see their own) */
if (!gbIsAdmin()) document.getElementById('filterUser').style.display = 'none';

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'gb-toast ' + type;
    clearTimeout(t._t); t._t = setTimeout(() => t.className = 'gb-toast', 3000);
}

async function load() {
    try {
        const [a, u, s] = await Promise.all([
            authFetch(`${API}/appointments`).then(r => r.json()),
            authFetch(`${API}/users`).then(r => r.json()),
            authFetch(`${API}/services`).then(r => r.json())
        ]);
        appts = a; users = u; services = s;

        /* Clients see only their own appointments */
        if (!gbIsAdmin()) {
            const me = gbGetUser();
            appts = appts.filter(ap => ap.userId === me?.id);
        }
        renderTable();
        populateSelects();
    } catch { showToast('Gabim në lidhje me serverin!', 'error'); }
}

function populateSelects() {
    document.getElementById('apptUser').innerHTML    = users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
    document.getElementById('apptService').innerHTML = services.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
}

function renderTable() {
    const fu = document.getElementById('filterUser').value.toLowerCase();
    const fs = document.getElementById('filterStatus').value;
    const filtered = appts.filter(a => {
        const user = users.find(u => u.id === a.userId);
        return (!fu || (user && user.name.toLowerCase().includes(fu))) && (!fs || a.status === fs);
    });
    const tbody = document.getElementById('apptTable');
    if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted);">Nuk u gjet asnjë takim.</td></tr>';
        return;
    }
    tbody.innerHTML = filtered.map(a => {
        const user = users.find(u => u.id === a.userId);
        const svc  = services.find(s => s.id === a.serviceId);
        const bc   = `badge-${(a.status || 'pending').toLowerCase()}`;
        const date = a.appointmentDate
            ? new Date(a.appointmentDate).toLocaleString('sq-AL', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
            : '–';
        /* Edit/delete only for admins */
        const actions = gbIsAdmin()
            ? `<div style="display:flex;gap:6px;">
                    <button class="btn-sm btn-edit" onclick="editAppt(${a.id})"><i class="fa-solid fa-pen"></i> Edito</button>
                    <button class="btn-sm btn-delete" onclick="deleteAppt(${a.id})"><i class="fa-solid fa-trash"></i> Fshi</button>
               </div>`
            : `<span class="badge ${bc}" style="font-size:.72rem;">${a.status}</span>`;
        return `<tr>
            <td style="color:var(--text-muted);font-size:.8rem;">#${a.id}</td>
            <td><strong>${user ? user.name : '–'}</strong></td>
            <td>${svc ? svc.name : '–'}</td>
            <td>${date}</td>
            <td><span class="badge ${bc}">${a.status}</span></td>
            <td>${actions}</td>
        </tr>`;
    }).join('');
}

function openModal(id = null) {
    editingId = id;
    document.getElementById('modalTitle').textContent = id ? 'Edito Takim' : 'Shto Takim të Ri';
    if (!id) {
        document.getElementById('apptDate').value   = '';
        document.getElementById('apptNotes').value  = '';
        document.getElementById('apptStatus').value = 'Pending';
        /* Pre-select current user for clients */
        if (!gbIsAdmin()) {
            const me = gbGetUser();
            const opt = document.getElementById('apptUser');
            if (me && opt) opt.value = me.id;
        }
    }
    document.getElementById('modalOverlay').classList.add('open');
}

function editAppt(id) {
    const a = appts.find(x => x.id === id);
    if (!a) return;
    openModal(id);
    document.getElementById('apptUser').value    = a.userId;
    document.getElementById('apptService').value = a.serviceId;
    document.getElementById('apptStatus').value  = a.status;
    document.getElementById('apptNotes').value   = a.notes || '';
    if (a.appointmentDate) {
        const d = new Date(a.appointmentDate);
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        document.getElementById('apptDate').value = d.toISOString().slice(0, 16);
    }
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }

async function saveAppt() {
    const me = gbGetUser();
    const body = {
        userId    : gbIsAdmin() ? parseInt(document.getElementById('apptUser').value) : me?.id,
        serviceId : parseInt(document.getElementById('apptService').value),
        appointmentDate: document.getElementById('apptDate').value,
        status    : document.getElementById('apptStatus').value,
        notes     : document.getElementById('apptNotes').value
    };
    if (!body.appointmentDate) { showToast('Zgjidhni datën!', 'error'); return; }
    try {
        const res = editingId
            ? await authFetch(`${API}/appointments/${editingId}`, { method: 'PUT',  body: JSON.stringify(body) })
            : await authFetch(`${API}/appointments`,              { method: 'POST', body: JSON.stringify(body) });
        if (res && res.ok) { showToast(editingId ? 'U përditësua!' : 'U shtua!', 'success'); closeModal(); load(); }
        else showToast('Gabim gjatë ruajtjes!', 'error');
    } catch { showToast('Lidhja dështoi!', 'error'); }
}

async function deleteAppt(id) {
    if (!gbIsAdmin()) { showToast('Nuk keni leje!', 'error'); return; }
    if (!confirm('A jeni i sigurt?')) return;
    try {
        const res = await authFetch(`${API}/appointments/${id}`, { method: 'DELETE' });
        if (res && res.ok) { showToast('U fshi!', 'success'); load(); }
    } catch { showToast('Gabim!', 'error'); }
}

load();
</script>
</body>
</html>
