<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Book - Përdoruesit</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="mobile-nav">
    <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    <span class="mobile-nav-logo">💅 Glow Book</span>
    <div style="width:40px;"></div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout-wrap">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1>Përdoruesit</h1>
                <p>Menaxho stafin dhe klientët e salonit</p>
            </div>
            <button class="btn-primary" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> Shto Përdorues
            </button>
        </div>

        <div class="stats-row">
            <div class="stat-mini"><div class="val" id="totalUsers">0</div><div class="lbl">Gjithsej</div></div>
            <div class="stat-mini"><div class="val" id="totalAdmins">0</div><div class="lbl">Admin</div></div>
            <div class="stat-mini"><div class="val" id="totalCustomers">0</div><div class="lbl">Klientë</div></div>
        </div>

        <div class="filters">
            <input type="text" id="filterName" placeholder="🔍 Kërko me emër ose email..." oninput="renderTable()">
            <select id="filterRole" onchange="renderTable()">
                <option value="">Të gjitha rolet</option>
                <option value="Admin">Admin</option>
                <option value="Customer">Customer</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Përdoruesi</th>
                        <th>Email</th>
                        <th>Telefoni</th>
                        <th>Roli</th>
                        <th>Regjistruar</th>
                        <th>Veprimet</th>
                    </tr>
                </thead>
                <tbody id="usersTable">
                    <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem;">Duke ngarkuar...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2 class="modal-title" id="modalTitle">Shto Përdorues</h2>
        <div class="field"><label>Emri i Plotë</label><input type="text" id="uName" placeholder="Ana Krasniqi"></div>
        <div class="field"><label>Email</label><input type="email" id="uEmail" placeholder="ana@example.com"></div>
        <div class="field"><label>Fjalëkalimi</label><input type="password" id="uPassword" placeholder="Lëre bosh për të mbajtur të njëjtin"></div>
        <div class="field"><label>Telefoni</label><input type="text" id="uPhone" placeholder="044 123 456"></div>
        <div class="field">
            <label>Roli</label>
            <select id="uRole">
                <option value="Customer">Customer</option>
                <option value="Admin">Admin</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" style="flex:1;" onclick="closeModal()">Anulo</button>
            <button class="btn-primary" style="flex:2;" onclick="saveUser()">
                <i class="fa-solid fa-floppy-disk"></i> Ruaj
            </button>
        </div>
    </div>
</div>

<div class="gb-toast" id="toast"></div>

<script src="../js/role.js"></script>
<script>
/* Admin-only page — clients get redirected */
gbInitPage({ page: 'users', adminOnly: true });

const API = 'https://glowbook-1.onrender.com/api';
let users = [], editingId = null;

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'gb-toast ' + type;
    clearTimeout(t._t); t._t = setTimeout(() => t.className = 'gb-toast', 3000);
}

async function load() {
    try {
        const res = await authFetch(`${API}/users`);
        users = await res.json();
        renderTable(); renderStats();
    } catch { showToast('Gabim në ngarkimin e përdoruesve!', 'error'); }
}

function renderStats() {
    document.getElementById('totalUsers').textContent     = users.length;
    document.getElementById('totalAdmins').textContent    = users.filter(u => u.role === 'Admin').length;
    document.getElementById('totalCustomers').textContent = users.filter(u => u.role === 'Customer').length;
}

function renderTable() {
    const fn = document.getElementById('filterName').value.toLowerCase();
    const fr = document.getElementById('filterRole').value;
    const filtered = users.filter(u =>
        (!fn || u.name.toLowerCase().includes(fn) || u.email.toLowerCase().includes(fn)) &&
        (!fr || u.role === fr)
    );
    const tbody = document.getElementById('usersTable');
    if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted);">Nuk u gjet asnjë përdorues.</td></tr>';
        return;
    }
    tbody.innerHTML = filtered.map(u => {
        const ini = u.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
        const bc  = u.role === 'Admin' ? 'badge-admin' : 'badge-customer';
        return `<tr>
            <td>
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="user-avatar-sm">${ini}</div>
                    <strong>${u.name}</strong>
                </div>
            </td>
            <td style="color:var(--text-subtle);">${u.email}</td>
            <td style="color:var(--text-subtle);">${u.phoneNumber || '–'}</td>
            <td><span class="badge ${bc}">${u.role}</span></td>
            <td style="color:var(--text-subtle);font-size:.82rem;">${u.createdAt ? new Date(u.createdAt).toLocaleDateString('sq-AL') : '–'}</td>
            <td>
                <div style="display:flex;gap:6px;">
                    <button class="btn-sm btn-view" onclick="viewProfile(${u.id})" title="Shiko profilin">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                    <button class="btn-sm btn-edit" onclick="editUser(${u.id})" title="Edito">
                        <i class="fa-solid fa-pen"></i>
                    </button>
                    <button class="btn-sm btn-delete" onclick="deleteUser(${u.id})" title="Fshi">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

function openModal(id = null) {
    editingId = id;
    document.getElementById('modalTitle').textContent = id ? 'Edito Përdoruesin' : 'Shto Përdorues të Ri';
    if (!id) {
        ['uName','uEmail','uPassword','uPhone'].forEach(i => document.getElementById(i).value = '');
        document.getElementById('uRole').value = 'Customer';
    }
    document.getElementById('modalOverlay').classList.add('open');
}

function editUser(id) {
    const u = users.find(x => x.id === id);
    if (!u) return;
    openModal(id);
    document.getElementById('uName').value  = u.name;
    document.getElementById('uEmail').value = u.email;
    document.getElementById('uPhone').value = u.phoneNumber || '';
    document.getElementById('uRole').value  = u.role;
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }

async function saveUser() {
    const data = {
        name: document.getElementById('uName').value.trim(),
        email: document.getElementById('uEmail').value.trim(),
        phoneNumber: document.getElementById('uPhone').value.trim(),
        role: document.getElementById('uRole').value
    };
    const pw = document.getElementById('uPassword').value;
    if (pw) data.password = pw;
    if (!data.name || !data.email) { showToast('Emri dhe Email janë të detyrueshëm!', 'error'); return; }
    try {
        const res = editingId
            ? await authFetch(`${API}/users/${editingId}`, { method: 'PUT',  body: JSON.stringify(data) })
            : await authFetch(`${API}/users`,              { method: 'POST', body: JSON.stringify(data) });
        if (res && res.ok) { showToast(editingId ? 'U përditësua!' : 'U shtua!', 'success'); closeModal(); load(); }
        else { const e = await res.json(); showToast(e.message || 'Gabim!', 'error'); }
    } catch { showToast('Lidhja dështoi!', 'error'); }
}

async function deleteUser(id) {
    if (!confirm('A jeni të sigurt?')) return;
    try {
        const res = await authFetch(`${API}/users/${id}`, { method: 'DELETE' });
        if (res && res.ok) { showToast('U fshi!', 'success'); load(); }
    } catch { showToast('Gabim!', 'error'); }
}

function viewProfile(id) { window.location.href = `profile.html?id=${id}`; }

load();
</script>
</body>
</html>
