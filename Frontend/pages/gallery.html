<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Book - Galeria</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="mobile-nav">
    <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    <span class="mobile-nav-logo">💅 Glow Book</span>
    <div style="width:40px;"></div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout-wrap">
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <span class="logo-icon">💅</span>
            <h2>Glow Book</h2>
            <p>Nail Salon</p>
        </div>
        <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-house nav-icon"></i> Dashboard</a>
        <a class="nav-item" href="appointments.html"><i class="fa-regular fa-calendar-check nav-icon"></i> Takimet</a>
        <a class="nav-item" href="services.html"><i class="fa-solid fa-spa nav-icon"></i> Shërbimet</a>
        <a class="nav-item" href="users.html"><i class="fa-solid fa-users nav-icon"></i> Përdoruesit</a>
        <a class="nav-item active" href="gallery.html"><i class="fa-regular fa-images nav-icon"></i> Galeria</a>
        <a class="nav-item" href="payment.html"><i class="fa-solid fa-credit-card nav-icon"></i> Pagesa</a>
        <div class="nav-bottom">
            <a class="nav-item nav-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket nav-icon"></i> Dilni</a>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1>Nail Art Gallery</h1>
                <p>Zbulo dizajnet më të bukura</p>
            </div>
            <button class="btn-primary" onclick="showToast('Funksionaliteti vjen së shpejti!','info')">
                <i class="fa-solid fa-plus"></i> Shto Dizajn
            </button>
        </div>

        <div class="gallery-stats">
            <div class="gallery-stat"><div class="n" id="statTotal">0</div><div class="l">Dizajne</div></div>
            <div class="gallery-stat"><div class="n" id="statEasy">0</div><div class="l">Të lehta</div></div>
            <div class="gallery-stat"><div class="n" id="statMedium">0</div><div class="l">Mesatare</div></div>
            <div class="gallery-stat"><div class="n" id="statHard">0</div><div class="l">Të vështira</div></div>
        </div>

        <div class="filters" style="margin-bottom:1.5rem;">
            <div class="filter-pills">
                <input class="search-box" type="text" placeholder="🔍 Kërko dizajn..." id="searchInput" oninput="renderGallery()">
                <button class="pill active" onclick="setFilter('Të gjitha')">Të gjitha</button>
                <button class="pill" onclick="setFilter('French')">French</button>
                <button class="pill" onclick="setFilter('Gel')">Gel</button>
                <button class="pill" onclick="setFilter('Ombre')">Ombre</button>
                <button class="pill" onclick="setFilter('Floral')">Floral</button>
                <button class="pill" onclick="setFilter('Glitter')">Glitter</button>
            </div>
        </div>

        <div class="gallery-grid" id="galleryGrid"></div>
    </main>
</div>

<!-- Design Modal -->
<div class="gallery-modal-bg" id="modalBg">
    <div class="gallery-modal">
        <div class="gallery-modal-preview" id="modalPreview"></div>
        <div class="gallery-modal-body">
            <h2 id="modalName">–</h2>
            <p id="modalDesc">–</p>
            <div class="modal-tags" id="modalTags"></div>
            <div class="gallery-modal-footer">
                <div>
                    <div class="modal-price" id="modalPrice">–</div>
                    <div class="modal-duration" id="modalDuration">–</div>
                </div>
                <div style="display:flex;gap:8px;">
                    <button class="btn-secondary" onclick="closeModal()">Mbyll</button>
                    <button class="btn-primary" onclick="bookDesign()">
                        <i class="fa-solid fa-calendar-check"></i> Rezervo tani
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="gb-toast" id="toast"></div>

<script src="../js/auth.js"></script>
<script>
document.getElementById('hamburgerBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
});

requireAuth();

const designs = [
    { id:1,  name:'French Classic',  emoji:'🤍', category:'French',  complexity:'E lehtë',     price:15, duration:30,  desc:'Dizajni klasik francez me majë të bardhë elegante. Perfekt për çdo rast.',              tags:['Klasik','Elegant','Casual'],   likes:24, liked:false, bg:'#F8F4FF' },
    { id:2,  name:'Pink Ombre',       emoji:'🌸', category:'Ombre',   complexity:'Mesatare',    price:25, duration:45,  desc:'Kalim gradual nga rozë e çelët te ngjyra më e thellë. Romantike dhe femërore.',        tags:['Romantike','Ombre','Pink'],    likes:31, liked:false, bg:'#FFF0F5' },
    { id:3,  name:'Glitter Bomb',     emoji:'✨', category:'Glitter', complexity:'E lehtë',     price:20, duration:40,  desc:'Shkëlqim dhe glamour në çdo gisht. Ideal për festa dhe ngjarje speciale.',              tags:['Festë','Glamour','Shkëlqim'], likes:18, liked:false, bg:'#FFFBF0' },
    { id:4,  name:'Floral Dream',     emoji:'🌺', category:'Floral',  complexity:'E vështirë',  price:40, duration:90,  desc:'Lule të vogla të vizatuara me dorë. Punë artizanale e lartë.',                         tags:['Art','Lule','Handmade'],       likes:45, liked:false, bg:'#F0FFF4' },
    { id:5,  name:'Gel Nude',         emoji:'🍑', category:'Gel',     complexity:'E lehtë',     price:18, duration:35,  desc:'Ngjyrë neutrale dhe naturale që i shkon çdo veshje dhe çdo rast.',                    tags:['Neutral','Natural','Gel'],     likes:29, liked:false, bg:'#FFF5F0' },
    { id:6,  name:'Galaxy Nails',     emoji:'🌌', category:'Glitter', complexity:'E vështirë',  price:45, duration:100, desc:'Efekt galaktik me ngjyra të errëta dhe shkëlqim si yje.',                              tags:['Galaxy','Artsy','Unique'],     likes:52, liked:false, bg:'#F0F0FF' },
    { id:7,  name:'Marble Effect',    emoji:'🖤', category:'Gel',     complexity:'E vështirë',  price:38, duration:80,  desc:'Efekt mermer luksoz me vija delikate. Sofistikate dhe moderne.',                       tags:['Luks','Marble','Modern'],      likes:37, liked:false, bg:'#F8F8F8' },
    { id:8,  name:'Floral Ombre',     emoji:'🌸', category:'Floral',  complexity:'E vështirë',  price:50, duration:120, desc:'Kombinim i ombre me lule të vizatuara. Dizajni më i popullarizuar i sezonit.',         tags:['Trending','Lule','Ombre'],     likes:61, liked:false, bg:'#FFF0F8' },
    { id:9,  name:'Red Glam',         emoji:'❤️', category:'Gel',     complexity:'E lehtë',     price:16, duration:30,  desc:'Ngjyrë e kuqe klasike e pasur. Ikonike dhe e fuqishme.',                               tags:['Klasik','Bold','Red'],         likes:33, liked:false, bg:'#FFF0F0' },
    { id:10, name:'Baby Blue',        emoji:'💙', category:'Ombre',   complexity:'Mesatare',    price:22, duration:45,  desc:'Kalim i butë në ngjyrë blu të çelët. Freskues dhe i ëmbël.',                           tags:['Pastel','Blue','Sweet'],       likes:27, liked:false, bg:'#F0F8FF' },
    { id:11, name:'Gold Tips',        emoji:'⭐', category:'French',  complexity:'Mesatare',    price:28, duration:50,  desc:'Majë të arta që i japin elegancë të veçantë çdo dore.',                               tags:['Gold','Luks','French'],        likes:41, liked:false, bg:'#FFFDF0' },
    { id:12, name:'Lavender Gel',     emoji:'💜', category:'Gel',     complexity:'E lehtë',     price:17, duration:30,  desc:'Ngjyrë lavanderi e butë dhe qetësuese. Perfekte për pranverën.',                      tags:['Pastel','Purple','Spring'],    likes:35, liked:false, bg:'#F8F0FF' },
];

let currentFilter = 'Të gjitha';
let currentDesign = null;

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'gb-toast ' + type;
    clearTimeout(t._t); t._t = setTimeout(() => t.className = 'gb-toast', 3000);
}

function setFilter(cat) {
    currentFilter = cat;
    document.querySelectorAll('.pill').forEach(b => b.classList.toggle('active', b.textContent.trim() === cat));
    renderGallery();
}

function renderGallery() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const filtered = designs.filter(d =>
        (currentFilter === 'Të gjitha' || d.category === currentFilter) &&
        (!search || d.name.toLowerCase().includes(search) || d.category.toLowerCase().includes(search))
    );

    document.getElementById('statTotal').textContent  = designs.length;
    document.getElementById('statEasy').textContent   = designs.filter(d => d.complexity === 'E lehtë').length;
    document.getElementById('statMedium').textContent = designs.filter(d => d.complexity === 'Mesatare').length;
    document.getElementById('statHard').textContent   = designs.filter(d => d.complexity === 'E vështirë').length;

    const grid = document.getElementById('galleryGrid');
    if (!filtered.length) {
        grid.innerHTML = '<div style="color:var(--text-muted);font-size:.85rem;padding:2rem;">Nuk ka dizajne për këtë filtrim.</div>';
        return;
    }
    grid.innerHTML = filtered.map(d => {
        const cc = d.complexity === 'E lehtë' ? 'complexity-easy' : d.complexity === 'Mesatare' ? 'complexity-medium' : 'complexity-hard';
        return `<div class="design-card" onclick="openDesign(${d.id})">
            <div class="design-preview" style="background:${d.bg};">${d.emoji}</div>
            <div class="design-card-body">
                <div class="design-name">${d.name}</div>
                <div class="design-desc">${d.desc.substring(0,60)}…</div>
                <div class="design-footer">
                    <span class="design-complexity ${cc}">${d.complexity}</span>
                    <span class="design-price">€${d.price}</span>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
                    <span style="font-size:.75rem;color:var(--text-muted);">${d.duration} min</span>
                    <button class="like-btn" onclick="event.stopPropagation();toggleLike(${d.id})" id="like-${d.id}">${d.liked?'❤️':'🤍'} ${d.likes}</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleLike(id) {
    const d = designs.find(x => x.id === id);
    d.liked = !d.liked; d.likes += d.liked ? 1 : -1;
    const btn = document.getElementById(`like-${id}`);
    btn.textContent = (d.liked ? '❤️' : '🤍') + ' ' + d.likes;
}

function openDesign(id) {
    currentDesign = designs.find(d => d.id === id);
    const mp = document.getElementById('modalPreview');
    mp.style.background = currentDesign.bg;
    mp.textContent = currentDesign.emoji;
    document.getElementById('modalName').textContent     = currentDesign.name;
    document.getElementById('modalDesc').textContent     = currentDesign.desc;
    document.getElementById('modalPrice').textContent    = '€' + currentDesign.price;
    document.getElementById('modalDuration').textContent = currentDesign.duration + ' minuta';
    document.getElementById('modalTags').innerHTML = currentDesign.tags.map(t => `<span class="tag">${t}</span>`).join('');
    document.getElementById('modalBg').classList.add('open');
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
function bookDesign() { closeModal(); window.location.href = 'appointments.html'; }

document.getElementById('modalBg').addEventListener('click', e => { if (e.target === document.getElementById('modalBg')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderGallery();
</script>
</body>
</html>
