<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Book - Kyçu</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="login-wrap">
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">💅</div>
            <h1>Glow Book</h1>
            <p>Nail Salon Management</p>
        </div>

        <div id="loadingMsg" class="login-loading">Duke verifikuar...</div>

        <div id="loginContent">
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchTab('login')">Kyçu</button>
                <button class="login-tab" onclick="switchTab('register')">Regjistrohu</button>
            </div>

            <div id="loginPanel" class="panel active">
                <div class="login-field">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="emri@example.com">
                </div>
                <div class="login-field">
                    <label>Fjalëkalimi</label>
                    <input type="password" id="loginPassword" placeholder="••••••••"
                        onkeydown="if(event.key==='Enter') handleLogin()">
                </div>
                <div class="login-forgot"><a href="#">Keni harruar fjalëkalimin?</a></div>
                <button class="login-btn" onclick="handleLogin()">
                    <i class="fa-solid fa-right-to-bracket"></i> Kyçu në llogarinë tuaj
                </button>
            </div>

            <div id="registerPanel" class="panel">
                <div class="login-field">
                    <label>Emri i plotë</label>
                    <input type="text" id="regName" placeholder="Ana Krasniqi">
                </div>
                <div class="login-field">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="emri@example.com">
                </div>
                <div class="login-field">
                    <label>Telefoni</label>
                    <input type="text" id="regPhone" placeholder="044 123 456">
                </div>
                <div class="login-field">
                    <label>Fjalëkalimi</label>
                    <input type="password" id="regPassword" placeholder="Min. 4 karaktere">
                </div>
                <button class="login-btn" onclick="handleRegister()">
                    <i class="fa-solid fa-user-plus"></i> Krijo llogarinë
                </button>
            </div>
        </div>
    </div>
</div>

<div class="gb-toast" id="toast"></div>

<script>
const API = 'https://glowbook-1.onrender.com/api';

(async function () {
    const token = localStorage.getItem('glowbook_token');
    if (!token) return;
    const lm = document.getElementById('loadingMsg');
    const lc = document.getElementById('loginContent');
    lm.classList.add('show'); lc.style.display = 'none';
    try {
        const res = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) { window.location.replace('./dashboard.html'); return; }
        localStorage.removeItem('glowbook_token'); localStorage.removeItem('glowbook_user');
    } catch {}
    lm.classList.remove('show'); lc.style.display = 'block';
})();

function switchTab(tab) {
    document.querySelectorAll('.login-tab').forEach((t, i) =>
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
    document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
    document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'gb-toast ' + type;
    clearTimeout(t._t); t._t = setTimeout(() => t.className = 'gb-toast', 3000);
}

async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showToast('Plotësoni të gjitha fushat!', 'error'); return; }
    try {
        const res = await fetch(`${API}/auth/login`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('glowbook_token', data.token);
            localStorage.setItem('glowbook_user', JSON.stringify(data.user));
            showToast(`Mirë se vini, ${data.user.name}!`, 'success');
            setTimeout(() => window.location.replace('./dashboard.html'), 500);
        } else {
            const err = await res.json();
            showToast(err.message || 'Email ose fjalëkalim i gabuar!', 'error');
        }
    } catch { showToast('Nuk u lidh me serverin!', 'error'); }
}

async function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!name || !email || !phone || !password) { showToast('Plotësoni të gjitha fushat!', 'error'); return; }
    try {
        const res = await fetch(`${API}/auth/register`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password, phoneNumber: phone })
        });
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('glowbook_token', data.token);
            localStorage.setItem('glowbook_user', JSON.stringify(data.user));
            showToast('Llogaria u krijua!', 'success');
            setTimeout(() => window.location.replace('./dashboard.html'), 500);
        } else {
            const err = await res.json();
            showToast(err.message || 'Gabim!', 'error');
        }
    } catch { showToast('Nuk u lidh me serverin!', 'error'); }
}
</script>
</body>
</html>
