<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Book - Profili</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="mobile-nav">
    <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
    <span class="mobile-nav-logo">💅 Glow Book</span>
    <div style="width:40px;"></div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout-wrap">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1 id="pageTitle">Profili</h1>
                <p>Detajet e plotë të përdoruesit</p>
            </div>
            <a class="btn-back" href="users.html" data-admin>
                <i class="fa-solid fa-arrow-left"></i> Kthehu te lista
            </a>
        </div>

        <div class="profile-grid">
            <!-- Left column -->
            <div>
                <div class="profile-card">
                    <div class="avatar-big" id="avatar">?</div>
                    <div class="profile-name" id="profileName">Duke ngarkuar...</div>
                    <div class="profile-email" id="profileEmail">–</div>
                    <span class="badge" id="profileBadge">–</span>
                    <div class="profile-info">
                        <div class="info-row"><span class="info-label">Telefoni</span><span class="info-value" id="profilePhone">–</span></div>
                        <div class="info-row"><span class="info-label">Roli</span><span class="info-value" id="profileRole">–</span></div>
                        <div class="info-row"><span class="info-label">Anëtar që nga</span><span class="info-value" id="profileDate">–</span></div>
                    </div>
                </div>

                <div class="card" style="margin-top:1.25rem;">
                    <div class="card-title">Statistikat</div>
                    <div class="stats-mini-3">
                        <div class="stat-box"><div class="n" id="statTotal">0</div><div class="l">Takime</div></div>
                        <div class="stat-box"><div class="n" id="statDone">0</div><div class="l">Kryer</div></div>
                        <div class="stat-box"><div class="n" id="statPending">0</div><div class="l">Në pritje</div></div>
                    </div>
                </div>
            </div>

            <!-- Right column -->
            <div class="right-col">

                <!-- Edit form — visible to admin OR viewing own profile -->
                <div class="card" id="editCard">
                    <div class="card-title">Ndrysho të Dhënat</div>
                    <div class="edit-form">
                        <div class="field"><label>Emri</label><input type="text" id="editName"></div>
                        <div class="field"><label>Email</label><input type="email" id="editEmail"></div>
                        <div class="field"><label>Telefoni</label><input type="text" id="editPhone"></div>
                        <button class="btn-save" onclick="saveChanges()">
                            <i class="fa-solid fa-floppy-disk"></i> Ruaj Ndryshimet
                        </button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Takimet e Fundit</div>
                    <div id="apptList">
                        <span style="color:var(--text-muted);font-size:.85rem;">Duke ngarkuar...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="gb-toast" id="toast"></div>

<script src="../js/role.js"></script>
<script>
gbInitPage({ page: 'users' });

const API = 'https://glowbook-1.onrender.com/api';
let userId = null;

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'gb-toast ' + type;
    clearTimeout(t._t); t._t = setTimeout(() => t.className = 'gb-toast', 3000);
}

async function load() {
    try {
        const params = new URLSearchParams(window.location.search);
        const me = gbGetUser();

        /* Clients can only view their own profile */
        if (gbIsAdmin()) {
            userId = parseInt(params.get('id') || me?.id || 1);
        } else {
            userId = me?.id;
            /* If a client tries to view someone else's profile, redirect */
            if (params.get('id') && parseInt(params.get('id')) !== userId) {
                window.location.replace('dashboard.html');
                return;
            }
            /* Hide back-to-list button for clients */
            const backBtn = document.querySelector('[data-admin]');
            if (backBtn) backBtn.style.display = 'none';
        }

        const [uRes, aRes, sRes] = await Promise.all([
            authFetch(`${API}/users`),
            authFetch(`${API}/appointments`),
            authFetch(`${API}/services`)
        ]);
        const users    = await uRes.json();
        const appts    = await aRes.json();
        const services = await sRes.json();

        const u = users.find(x => x.id === userId);
        if (!u) { showToast('Përdoruesi nuk u gjet!', 'error'); return; }

        const ini = u.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
        document.getElementById('avatar').textContent       = ini;
        document.getElementById('pageTitle').textContent    = u.name;
        document.getElementById('profileName').textContent  = u.name;
        document.getElementById('profileEmail').textContent = u.email;
        document.getElementById('profilePhone').textContent = u.phoneNumber || '–';
        document.getElementById('profileRole').textContent  = u.role;
        document.getElementById('profileDate').textContent  = u.createdAt ? new Date(u.createdAt).toLocaleDateString('sq-AL') : '–';

        const badge = document.getElementById('profileBadge');
        badge.textContent = u.role;
        badge.className   = `badge ${u.role === 'Admin' ? 'badge-admin' : 'badge-customer'}`;

        document.getElementById('editName').value  = u.name;
        document.getElementById('editEmail').value = u.email;
        document.getElementById('editPhone').value = u.phoneNumber || '';

        const ua = appts.filter(a => a.userId === userId);
        document.getElementById('statTotal').textContent   = ua.length;
        document.getElementById('statDone').textContent    = ua.filter(a => a.status === 'Done').length;
        document.getElementById('statPending').textContent = ua.filter(a => a.status === 'Pending').length;

        const apptList = document.getElementById('apptList');
        if (!ua.length) {
            apptList.innerHTML = '<span style="color:var(--text-muted);font-size:.85rem;">Nuk ka takime</span>';
            return;
        }
        apptList.innerHTML = ua.slice(0, 5).map(a => {
            const svc  = services.find(s => s.id === a.serviceId);
            const bc   = a.status === 'Pending' ? 'badge-pending' : a.status === 'Confirmed' ? 'badge-confirmed' : 'badge-done';
            const date = a.appointmentDate ? new Date(a.appointmentDate).toLocaleDateString('sq-AL') : '–';
            return `<div class="appt-item">
                <div class="appt-dot"></div>
                <div class="appt-info">
                    <div class="appt-name">${svc ? svc.name : 'Shërbim'}</div>
                    <div class="appt-date">${date}</div>
                </div>
                <span class="badge ${bc}">${a.status}</span>
            </div>`;
        }).join('');
    } catch(e) { console.error(e); showToast('Gabim në lidhje me serverin!', 'error'); }
}

async function saveChanges() {
    const name  = document.getElementById('editName').value.trim();
    const email = document.getElementById('editEmail').value.trim();
    const phone = document.getElementById('editPhone').value.trim();
    if (!name || !email) { showToast('Emri dhe Email janë të detyrueshëm!', 'error'); return; }
    try {
        const res = await authFetch(`${API}/users/${userId}`, {
            method: 'PUT', body: JSON.stringify({ name, email, phoneNumber: phone })
        });
        if (res && res.ok) {
            showToast('Të dhënat u përditësuan!', 'success');
            /* Update localStorage if editing own profile */
            const me = gbGetUser();
            if (me && me.id === userId) {
                localStorage.setItem(GB.KEY_USER, JSON.stringify({ ...me, name, email, phoneNumber: phone }));
            }
            load();
        } else { const e = await res.json(); showToast(e.message || 'Gabim!', 'error'); }
    } catch { showToast('Lidhja dështoi!', 'error'); }
}

load();
</script>
</body>
</html>
